<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic PC Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 현대적이고 미학적인 컬러 팔레트 */
        :root {
            --bg-light: #f0f7ff;
            --glass-white: rgba(255, 255, 255, 0.85);
            --main-sky: #7dd3fc;
            --deep-sky: #0ea5e9;
            --neon-blue: rgba(14, 165, 233, 0.3);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow: hidden;
        }

        .main-container { display: flex; width: 100%; height: 100vh; padding: 20px; gap: 20px; }

        /* 왼쪽 사이드바: 플로팅 카드 스타일 */
        .sidebar {
            width: 380px;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 30px 25px;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
        }

        .header h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem; 
            color: var(--deep-sky);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .search-area { 
            display: flex; 
            background: white;
            padding: 5px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .search-area input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            outline: none;
            font-size: 0.95rem;
            background: transparent;
        }

        .search-area button {
            padding: 10px 20px;
            background: var(--deep-sky);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-area button:hover {
            background: #0369a1;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }

        /* 결과 리스트 */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .results-list::-webkit-scrollbar { width: 5px; }
        .results-list::-webkit-scrollbar-thumb { background: var(--main-sky); border-radius: 10px; }

        .result-item {
            padding: 18px;
            background: white;
            margin-bottom: 15px;
            border-radius: 18px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .result-item:hover {
            border-color: var(--main-sky);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .place-name { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; display: block; }
        .place-address { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }

        /* 오른쪽 지도: 현대적 프레임 디자인 */
        .map-frame {
            flex: 1;
            position: relative;
            border-radius: 30px;
            padding: 8px; /* 테두리 두께 효과 */
            background: linear-gradient(135deg, var(--main-sky), var(--deep-sky));
            box-shadow: 0 20px 50px var(--neon-blue);
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 24px; /* 지도 내부도 둥글게 */
        }

        /* 이모지 커스텀 마커 */
        .emoji-marker {
            font-size: 32px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            cursor: pointer;
            transition: transform 0.2s;
        }
        .emoji-marker:hover { transform: scale(1.2) translateY(-5px); }

        /* 미학적인 인포 팝업 */
        .custom-popup {
            position: absolute;
            bottom: 50px;
            left: -75px;
            width: 180px;
            padding: 15px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            border: 1px solid var(--main-sky);
        }
    </style>
</head>
<body>

<div class="main-container">
    <aside class="sidebar">
        <div class="header">
            <h1>Aesthetic PC Search</h1>
            <div class="search-area">
                <input type="text" id="keywordInput" placeholder="어디로 갈까요?">
                <button onclick="searchPlaces()">Search</button>
            </div>
        </div>
        <ul id="resultsList" class="results-list">
            </ul>
    </aside>

    <div class="map-frame">
        <div id="map"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d590ac57a992632760c2bc0b3177cfef&libraries=services"></script>

<script>
    let map; 
    let ps;  
    let markers = []; 
    let overlays = [];

    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 4 
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();
        getCurrentLocation();
    });

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const currentPos = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(currentPos);
                // 현재 위치 마커 (파란 점 스타일)
                new kakao.maps.Marker({ map: map, position: currentPos });
            });
        }
    }

    function searchPlaces() {
        const keyword = document.getElementById('keywordInput').value;
        if (!keyword.trim()) return;
        ps.keywordSearch(keyword, callback);
    }

    function callback(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayResults(data);
        } else {
            alert('검색 결과를 찾을 수 없습니다.');
        }
    }

    function displayResults(places) {
        const listEl = document.getElementById('resultsList');
        const bounds = new kakao.maps.LatLngBounds();
        
        listEl.innerHTML = '';
        clearMap();

        places.forEach((place) => {
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            
            // 이모지 마커 추가
            const markerContent = `<div class="emoji-marker" onclick="showPopup('${place.place_name}', '${place.y}', '${place.x}')">🕹️</div>`;
            const customMarker = new kakao.maps.CustomOverlay({
                position: placePosition,
                content: markerContent
            });
            customMarker.setMap(map);
            markers.push(customMarker);

            // 리스트 아이템 추가
            const li = document.createElement('li');
            li.className = 'result-item';
            li.innerHTML = `
                <span class="place-name">${place.place_name}</span>
                <span class="place-address">${place.road_address_name || place.address_name}</span>
            `;
            
            li.onclick = () => {
                map.panTo(placePosition);
                showPopup(place.place_name, place.y, place.x);
            };
            
            listEl.appendChild(li);
            bounds.extend(placePosition);
        });

        map.setBounds(bounds);
    }

    function showPopup(name, y, x) {
        closeAllOverlays();
        const content = `
            <div class="custom-popup">
                <strong style="color:#0369a1">${name}</strong>
                <div style="margin-top:8px; font-size:11px; color:#aaa; cursor:pointer;" onclick="closeAllOverlays()">[ 닫기 ]</div>
            </div>
        `;
        const overlay = new kakao.maps.CustomOverlay({
            content: content,
            map: map,
            position: new kakao.maps.LatLng(y, x)
        });
        overlays.push(overlay);
    }

    function clearMap() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        closeAllOverlays();
    }

    function closeAllOverlays() {
        overlays.forEach(o => o.setMap(null));
        overlays = [];
    }
</script>

</body>
</html>
